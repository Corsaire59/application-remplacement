<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Application Remplacement</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:Arial;background:#0b3a70;color:white;padding:20px;">

<h1 style="text-align:center;color:#ffd400;">Remplacements</h1>

<div id="loginBox" style="background:white;color:black;padding:15px;border-radius:12px;margin-bottom:20px;">
  <h2>Connexion agent</h2>

  <input id="loginEmail" type="email" placeholder="Email" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">
  <input id="loginPassword" type="password" placeholder="Mot de passe" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">

  <button onclick="connexion()" style="width:100%;padding:12px;background:#ffd400;border:0;border-radius:8px;font-weight:bold;">
    Se connecter
  </button>

  <hr style="margin:20px 0;">

  <div id="inscriptionBox">
    <h2>Inscription agent</h2>

    <p style="background:#fff8d6;border-left:5px solid #ffd400;padding:10px;border-radius:8px;">
      Après création du compte, vous devrez confirmer votre inscription depuis le mail reçu avant de pouvoir vous connecter.
    </p>

    <input id="prenom" placeholder="Prénom" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">
    <input id="nom" placeholder="Nom" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">
    <input id="registerEmail" type="email" placeholder="Email" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">
    <input id="registerPassword" type="password" placeholder="Mot de passe" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">

    <button onclick="inscription()" style="width:100%;padding:12px;background:#2e7d32;color:white;border:0;border-radius:8px;font-weight:bold;">
      Créer mon compte
    </button>
  </div>

  <div id="confirmationBox" style="display:none;background:#e8f5e9;border-left:5px solid #2e7d32;padding:12px;border-radius:8px;margin-top:15px;">
    <strong>Compte créé.</strong><br>
    Vérifie ta boîte mail et confirme ton inscription avant de te connecter.
  </div>
</div>

<div id="userBox" style="display:none;background:#e8f5e9;color:black;padding:15px;border-radius:12px;margin-bottom:20px;">
  <p><strong>Connecté :</strong> <span id="userName"></span></p>
  <button onclick="deconnexion()" style="width:100%;padding:12px;background:#c62828;color:white;border:0;border-radius:8px;font-weight:bold;">
    Se déconnecter
  </button>
</div>

<div id="formBox" style="display:none;background:white;color:black;padding:15px;border-radius:12px;">
  <input id="date" type="date" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">

  <select id="service" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">
    <option>Journée</option>
    <option>Nuit</option>
    <option>Matin</option>
    <option>Après-midi</option>
    <option>12h</option>
    <option>RH</option>
  </select>

  <select id="mode" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">
    <option>Officiel</option>
    <option>Arrangement entre agents</option>
  </select>

  <textarea id="message" placeholder="Exemple : Bonjour, je cherche à me faire remplacer le 26 en journée. Échange possible contre une nuit ou un RH."
    style="width:100%;height:120px;padding:10px;margin:10px 0;box-sizing:border-box;border-radius:8px;"></textarea>

  <button onclick="ajouterDemande()" style="width:100%;padding:12px;background:#ffd400;border:0;border-radius:8px;font-weight:bold;">
    Publier la demande
  </button>
</div>

<div id="liste"></div>

<script>
const SUPABASE_URL = "https://dmtsbrlxkovmzjeqsfrl.supabase.co";
const SUPABASE_KEY = "sb_publishable_d-b3ZPiauCROoIUO1zE5_Q_R0s_ULkG";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let utilisateurConnecte = null;
let profilConnecte = null;

async function inscription() {
  const prenom = document.getElementById("prenom").value.trim();
  const nom = document.getElementById("nom").value.trim();
  const email = document.getElementById("registerEmail").value.trim();
  const password = document.getElementById("registerPassword").value;

  if (!prenom || !nom || !email || !password) {
    alert("Merci de remplir tous les champs.");
    return;
  }

  const { data, error } = await client.auth.signUp({
    email: email,
    password: password
  });

  if (error) {
    alert("Erreur inscription : " + error.message);
    return;
  }

  const userId = data.user?.id;

  const { error: profilError } = await client.from("profils").insert({
    id: userId,
    email: email,
    nom: nom,
    prenom: prenom
  });

  if (profilError) {
    alert("Compte créé, mais erreur profil : " + profilError.message);
    return;
  }

  document.getElementById("prenom").value = "";
  document.getElementById("nom").value = "";
  document.getElementById("registerEmail").value = "";
  document.getElementById("registerPassword").value = "";

  document.getElementById("inscriptionBox").style.display = "none";
  document.getElementById("confirmationBox").style.display = "block";

  alert("Compte créé. Vérifie ta boîte mail et confirme ton inscription avant de te connecter.");
}

async function connexion() {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;

  const { data, error } = await client.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {
    alert("Erreur connexion : " + error.message);
    return;
  }

  utilisateurConnecte = data.user;
  await chargerProfil();
  afficherConnecte();
  chargerDemandes();
}

async function chargerProfil() {
  const { data, error } = await client
    .from("profils")
    .select("*")
    .eq("id", utilisateurConnecte.id)
    .single();

  if (error) {
    profilConnecte = {
      nom: utilisateurConnecte.email,
      prenom: ""
    };
    return;
  }

  profilConnecte = data;
}

async function verifierSession() {
  const { data } = await client.auth.getSession();

  if (data.session) {
    utilisateurConnecte = data.session.user;
    await chargerProfil();
    afficherConnecte();
    chargerDemandes();
  } else {
    afficherDeconnecte();
    document.getElementById("liste").innerHTML = "";
  }
}

function nomComplet() {
  if (!profilConnecte) return "";
  return `${profilConnecte.prenom || ""} ${profilConnecte.nom || ""}`.trim();
}

function afficherConnecte() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("userBox").style.display = "block";
  document.getElementById("formBox").style.display = "block";
  document.getElementById("userName").innerText = nomComplet();
}

function afficherDeconnecte() {
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("userBox").style.display = "none";
  document.getElementById("formBox").style.display = "none";
}

async function deconnexion() {
  await client.auth.signOut();
  utilisateurConnecte = null;
  profilConnecte = null;
  afficherDeconnecte();
  document.getElementById("liste").innerHTML = "";
}

async function ajouterDemande() {
  if (!utilisateurConnecte) {
    alert("Tu dois être connecté.");
    return;
  }

  const date = document.getElementById("date").value;
  const service = document.getElementById("service").value;
  const mode = document.getElementById("mode").value;
  const message = document.getElementById("message").value;

  if (!date) {
    alert("Merci de choisir une date.");
    return;
  }

  const { error } = await client.from("demandes").insert({
    agent_nom: nomComplet(),
    agent_id: utilisateurConnecte.id,
    agent_email: utilisateurConnecte.email,
    date_service: date,
    type_service: service,
    mode_remplacement: mode,
    message: message,
    statut: "Disponible",
    pris_par: null,
    pris_par_id: null,
    pris_par_email: null
  });

  if (error) {
    alert("Erreur : " + error.message);
    return;
  }

  alert("Demande publiée !");
  document.getElementById("date").value = "";
  document.getElementById("message").value = "";
  chargerDemandes();
}

async function prendreDemande(id, agentId) {
  if (!utilisateurConnecte) {
    alert("Tu dois être connecté.");
    return;
  }

  if (agentId === utilisateurConnecte.id) {
    alert("Tu ne peux pas prendre ta propre demande.");
    return;
  }

  const { error } = await client
    .from("demandes")
    .update({
      statut: "Pris",
      pris_par: nomComplet(),
      pris_par_id: utilisateurConnecte.id,
      pris_par_email: utilisateurConnecte.email
    })
    .eq("id", id)
    .eq("statut", "Disponible");

  if (error) {
    alert("Erreur : " + error.message);
    return;
  }

  alert("Tu as pris ce remplacement.");
  chargerDemandes();
}

async function annulerPrise(id) {
  if (!utilisateurConnecte) return;

  const { error } = await client
    .from("demandes")
    .update({
      statut: "Disponible",
      pris_par: null,
      pris_par_id: null,
      pris_par_email: null
    })
    .eq("id", id)
    .eq("pris_par_id", utilisateurConnecte.id);

  if (error) {
    alert("Erreur : " + error.message);
    return;
  }

  alert("Prise annulée.");
  chargerDemandes();
}

async function supprimerDemande(id) {
  if (!utilisateurConnecte) return;

  const confirmation = confirm("Supprimer cette demande ?");

  if (!confirmation) return;

  const { error } = await client
    .from("demandes")
    .delete()
    .eq("id", id)
    .eq("agent_id", utilisateurConnecte.id);

  if (error) {
    alert("Erreur : " + error.message);
    return;
  }

  alert("Demande supprimée.");
  chargerDemandes();
}

async function chargerDemandes() {
  if (!utilisateurConnecte) {
    document.getElementById("liste").innerHTML = "";
    return;
  }

  const { data, error } = await client
    .from("demandes")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error.message);
    return;
  }

  const liste = document.getElementById("liste");
  liste.innerHTML = "";

  data.forEach(d => {
    const estPris = d.statut === "Pris";
    const estMaDemande = d.agent_id === utilisateurConnecte.id || d.agent_nom === nomComplet();
    const estMaPrise = d.pris_par_id === utilisateurConnecte.id;

    const couleurFond = estPris ? "#ffe1e1" : "#e2ffe2";
    const couleurBordure = estPris ? "#c62828" : "#2e7d32";
    const badge = estPris ? "🔴 Pris" : "🟢 Disponible";

    let bouton = "";

    if (estPris) {
      if (estMaPrise) {
        bouton = `
          <button onclick="annulerPrise(${d.id})"
            style="width:100%;padding:12px;background:#ef6c00;color:white;border:0;border-radius:8px;font-weight:bold;margin-top:10px;">
            Annuler ma prise
          </button>
        `;
      } else {
        bouton = `
          <button disabled
            style="width:100%;padding:12px;background:#c62828;color:white;border:0;border-radius:8px;font-weight:bold;margin-top:10px;">
            Déjà pris par ${d.pris_par || "un agent"}
          </button>
        `;
      }
    } else {
      if (estMaDemande) {
        bouton = `
          <button onclick="supprimerDemande(${d.id})"
            style="width:100%;padding:12px;background:#c62828;color:white;border:0;border-radius:8px;font-weight:bold;margin-top:10px;">
            Supprimer ma demande
          </button>
        `;
      } else {
        bouton = `
          <button onclick="prendreDemande(${d.id}, '${d.agent_id || ""}')"
            style="width:100%;padding:12px;background:#2e7d32;color:white;border:0;border-radius:8px;font-weight:bold;margin-top:10px;">
            Je prends
          </button>
        `;
      }
    }

    liste.innerHTML += `
      <div style="background:${couleurFond};color:black;padding:15px;border-radius:14px;margin-top:15px;border-left:8px solid ${couleurBordure};box-shadow:0 4px 10px rgba(0,0,0,0.2);">
        <h3 style="margin-top:0;">${badge}</h3>
        <p><strong>Demandé par :</strong> ${d.agent_nom}</p>
        <p><strong>Date :</strong> ${d.date_service}</p>
        <p><strong>Service :</strong> ${d.type_service}</p>
        <p><strong>Mode :</strong> ${d.mode_remplacement}</p>
        <p><strong>Message :</strong><br>${d.message || "Aucun message"}</p>
        ${d.pris_par ? `<p><strong>Pris par :</strong> ${d.pris_par}</p>` : ""}
        ${bouton}
      </div>
    `;
  });
}

client
  .channel('realtime-demandes')
  .on(
    'postgres_changes',
    {
      event: '*',
      schema: 'public',
      table: 'demandes'
    },
    () => {
      chargerDemandes();
    }
  )
  .subscribe();

verifierSession();
</script>

</body>
</html>
