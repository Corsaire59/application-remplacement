<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Application Remplacement</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:Arial;background:#0b3a70;color:white;padding:20px;">

<h1 style="text-align:center;color:#ffd400;">Remplacements</h1>

<div style="background:white;color:black;padding:15px;border-radius:12px;">
  <input id="nom" placeholder="Nom agent" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">
  <input id="date" type="date" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">

  <select id="service" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">
    <option>Journée</option>
    <option>Nuit</option>
    <option>Matin</option>
    <option>Après-midi</option>
    <option>12h</option>
    <option>RH</option>
  </select>

  <select id="mode" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">
    <option>Officiel</option>
    <option>Arrangement entre agents</option>
  </select>

  <textarea id="message" placeholder="Exemple : Bonjour, je cherche à me faire remplacer le 26 en journée. Échange possible contre une nuit ou un RH."
    style="width:100%;height:120px;padding:10px;margin:10px 0;box-sizing:border-box;border-radius:8px;"></textarea>

  <button onclick="ajouterDemande()" style="width:100%;padding:12px;background:#ffd400;border:0;border-radius:8px;font-weight:bold;">
    Publier la demande
  </button>
</div>

<div id="liste"></div>

<script>
const SUPABASE_URL = "https://dmtsbrlxkovmzjeqsfrl.supabase.co";
const SUPABASE_KEY = "sb_publishable_d-b3ZPiauCROoIUO1zE5_Q_R0s_ULkG";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function ajouterDemande() {
  const nom = document.getElementById("nom").value;
  const date = document.getElementById("date").value;
  const service = document.getElementById("service").value;
  const mode = document.getElementById("mode").value;
  const message = document.getElementById("message").value;

  const { error } = await client.from("demandes").insert({
    agent_nom: nom,
    date_service: date,
    type_service: service,
    mode_remplacement: mode,
    message: message,
    statut: "Disponible",
    pris_par: null
  });

  if (error) {
    alert("Erreur : " + error.message);
    return;
  }

  alert("Demande publiée !");
  document.getElementById("nom").value = "";
  document.getElementById("date").value = "";
  document.getElementById("message").value = "";
  chargerDemandes();
}

async function prendreDemande(id) {
  const nomPreneur = prompt("Ton nom pour prendre ce remplacement :");

  if (!nomPreneur) {
    return;
  }

  const { error } = await client
    .from("demandes")
    .update({
      statut: "Pris",
      pris_par: nomPreneur
    })
    .eq("id", id);

  if (error) {
    alert("Erreur : " + error.message);
    return;
  }

  alert("Remplacement pris !");
  chargerDemandes();
}

async function chargerDemandes() {
  const { data, error } = await client
    .from("demandes")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error.message);
    return;
  }

  const liste = document.getElementById("liste");
  liste.innerHTML = "";

  data.forEach(d => {
    const estPris = d.statut === "Pris";
    const couleurFond = estPris ? "#ffe1e1" : "#e2ffe2";
    const couleurBordure = estPris ? "#c62828" : "#2e7d32";
    const badge = estPris ? "🔴 Pris" : "🟢 Disponible";

    const bouton = estPris
      ? `<button disabled style="width:100%;padding:12px;background:#c62828;color:white;border:0;border-radius:8px;font-weight:bold;margin-top:10px;">Déjà pris par ${d.pris_par || "un agent"}</button>`
      : `<button onclick="prendreDemande(${d.id})" style="width:100%;padding:12px;background:#2e7d32;color:white;border:0;border-radius:8px;font-weight:bold;margin-top:10px;">Je prends</button>`;

    liste.innerHTML += `
      <div style="background:${couleurFond};color:black;padding:15px;border-radius:14px;margin-top:15px;border-left:8px solid ${couleurBordure};box-shadow:0 4px 10px rgba(0,0,0,0.2);">
        <h3 style="margin-top:0;">${badge}</h3>
        <p><strong>Demandé par :</strong> ${d.agent_nom}</p>
        <p><strong>Date :</strong> ${d.date_service}</p>
        <p><strong>Service :</strong> ${d.type_service}</p>
        <p><strong>Mode :</strong> ${d.mode_remplacement}</p>
        <p><strong>Message :</strong><br>${d.message || "Aucun message"}</p>
        ${d.pris_par ? `<p><strong>Pris par :</strong> ${d.pris_par}</p>` : ""}
        ${bouton}
      </div>
    `;
  });
}

chargerDemandes();
</script>

</body>
</html>
